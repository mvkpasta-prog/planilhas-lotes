<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Controle de Lotes — Lotes de Entrega</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
  :root{
    --primary:#2563eb; --accent:#0ea5e9; --bg:#f6fbff; --card:#fff; --text:#0f172a;
    --muted:#6b7280; --success:#10b981; --warning:#f59e0b;
    --status-carregado: #10b981;
    --status-embarque: #3b82f6;
    --status-transito: #ef4444;
    --status-contratar: #f97316;
    --produto-soja: #10b981;
    --produto-milho: #fbbf24;
    --produto-sorgo: #6b7280;
    --produto-total: #8b5cf6;
  }
  *{box-sizing:border-box}
  body{
    font-family:Inter, "Segoe UI", Roboto, Arial, sans-serif;
    margin:0;
    background:var(--bg);
    color:var(--text);
    padding:12px
  }
  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url('https://raw.githubusercontent.com/mvkpasta-prog/planilhas-lotes/main/mvklogo.png');
    background-repeat: no-repeat;
    background-position: center center;
    background-size: 80vh;
    opacity: 0.05;
    z-index: -1;
    pointer-events: none;
  }
  header{
    background:linear-gradient(90deg,var(--primary),var(--accent));
    color:white;
    padding:12px;
    border-radius:8px;
    margin-bottom:16px;
    text-align:center;
    font-weight:700;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    flex-wrap: wrap;
  }
  .header-title { 
    display:flex; 
    align-items:center; 
    gap:8px; 
    min-width:200px; 
  }
  .last-update-top { 
    font-size:12px; 
    color:rgba(255,255,255,0.9); 
    display:flex; 
    align-items:center; 
    gap:6px; 
  }
  .wrap{
    max-width:1400px;
    margin:0 auto;
    width:100%
  }
  .header-btn { 
    background:#fff; 
    color:var(--primary); 
    border:none; 
    padding:6px 10px; 
    border-radius:6px; 
    cursor:pointer; 
    font-weight:700; 
    font-size:13px; 
    text-decoration:none; 
    transition:background .2s, opacity .2s; 
    display:flex; 
    align-items:center; 
    gap:6px; 
    white-space: nowrap;
  }
  .header-btn:hover { 
    background:var(--bg); 
    opacity:.95; 
  }
  .status-cards {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }
  .status-card{
    background:var(--card);
    border-radius:8px;
    padding:10px;
    box-shadow:0 3px 8px rgba(0,0,0,0.06);
    text-align:center;
    transition:all .3s; 
    min-height:72px; 
    display:flex; 
    flex-direction:column; 
    justify-content:center;
  }
  .status-card:hover{
    transform:translateY(-2px);
    box-shadow:0 5px 12px rgba(0,0,0,0.08)
  }
  .status-card h3{
    margin:0 0 6px 0;
    font-size:14px;
    color:var(--text);
    font-weight:600
  }
  .status-card .count{
    font-size:22px;
    font-weight:700;
    margin:6px 0
  }
  .product-row {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }
  .clientes-section{
    margin-bottom:24px
  }
  .clientes-container{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    gap:16px;
    margin-bottom:24px
  }
  .cliente-card{
    background:var(--card);
    border-radius:8px;
    padding:14px;
    box-shadow:0 3px 8px rgba(0,0,0,0.06);
    transition:all .3s; 
    cursor:pointer;
  }
  .cliente-card:hover{
    transform:translateY(-2px);
    box-shadow:0 5px 12px rgba(0,0,0,0.08)
  }
  .cliente-name{
    font-weight:700;
    font-size:16px;
    color:var(--text);
    margin:0 0 6px 0
  }
  .cliente-info{
    display:flex;
    justify-content:space-between;
    margin-bottom:6px;
    align-items:center
  }
  .info-label{
    font-weight:600;
    color:var(--muted);
    font-size:12px
  }
  .info-value{
    font-weight:700;
    font-size:13px
  }
  .cliente-produto{
    padding:3px 7px;
    border-radius:5px;
    font-size:11px;
    font-weight:600;
    display:inline-block;
    margin-top:4px;
    color: white;
  }
  .status-pendente-tag{
    background-color: var(--status-embarque);
    color: white;
    padding: 2px 7px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
  }
  .empty{
    color:var(--muted);
    font-style:italic;
    padding:10px;
    text-align:center;
  }
  #filterInput {
    flex-grow:1; 
    min-width:200px; 
    padding:10px; 
    border:1px solid #ccc; 
    border-radius:6px; 
    font-size:14px
  }
  .modal-overlay {
    position:fixed; 
    top:0; 
    left:0; 
    width:100%; 
    height:100%; 
    background:rgba(0,0,0,0.6); 
    display:none; 
    justify-content:center; 
    align-items:center; 
    z-index:1000
  }
  .modal-content {
    background:var(--card); 
    padding:20px; 
    border-radius:8px; 
    max-width:600px; 
    width:95%; 
    max-height:90vh; 
    overflow-y:auto; 
    position:relative;
  }
  .modal-close {
    position:absolute; 
    top:10px; 
    right:10px; 
    background:none; 
    border:none; 
    font-size:22px; 
    cursor:pointer; 
    color:var(--muted)
  }
  .modal-header h3 {
    margin-top:0; 
    font-size:18px; 
    color:var(--primary); 
    border-bottom:2px solid var(--accent); 
    padding-bottom:8px; 
    margin-bottom:15px;
  }
  .modal-body p {
    margin:5px 0; 
    font-size:14px
  }
  .modal-body .info-label {
    font-weight:600; 
    color:var(--text); 
    display:inline-block; 
    min-width:160px;
  }
  .modal-body .info-value {
    font-weight:400; 
    color:var(--muted);
  }
  .modal-clientes-list {
    margin-top:15px; 
    padding-top:10px; 
    border-top:1px dashed #ddd;
  }
  .modal-clientes-list h4 {
    margin-top:0; 
    margin-bottom:12px; 
    font-size:14px; 
    color:var(--accent);
  }
  .contrato-item {
    background: #fbfdff;
    padding: 10px;
    border-radius: 6px;
    margin-bottom: 8px;
    border: 1px solid #edf2f7;
  }
  .contrato-item:last-child {margin-bottom: 0;}
  .contrato-linha {
    display: flex;
    justify-content: space-between;
    margin-top: 4px;
    font-size: 13px;
  }
  .contrato-linha:first-child {margin-top: 0;}
  .toggle-btn {
    background: var(--primary);
    color: white;
    border: none;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 700;
    font-size: 14px;
    transition: opacity 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .toggle-btn.secondary {
    background: #ffffff;
    color: var(--primary);
    border: 2px solid rgba(255,255,255,0.15);
  }
  .toggle-btn:hover { opacity: 0.95; }
  @media (max-width:1100px){
    .product-row { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width:700px){
    .status-cards { grid-template-columns: 1fr; }
    .product-row { grid-template-columns: repeat(2,1fr); }
  }
  @media (max-width:480px){
    .product-row { grid-template-columns: 1fr; }
  }
  @media (max-width:600px){
    body{padding:8px}
    .cliente-card{min-width:100%; padding:12px}
    header {flex-direction:column; align-items:flex-start; gap:10px}
    .header-btn {width:100%; justify-content:center; order:2}
    .header-title {width:100%; justify-content:space-between}
    .last-update-top {order:3}
  }
  </style>

  <script>
  const SHEET_ID = '1o0wF2ScSkyxqY8FHFI-rA6k_3uMI2wsZr2wQG8JD4B4';
  const GID_ENTREGA = '1186247985';
  const AUTO_UPDATE_INTERVAL = 300000;
  let globalData = [];
  let currentView = localStorage.getItem('lotes_entregas_view') || 'cliente';

  function normalizeHeader(h) { 
    if (h==null) return ''; 
    return String(h).trim().toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
      .replace(/[^a-z0-9]/g,''); 
  }
  function normalizeText(t) { 
    if (t==null) return ''; 
    return String(t).trim().toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g,''); 
  }
  function parseCSV(text) {
    if (!text) return { arrays: [], headersOrig: [], headersNorm: [], objects: [] };
    const lines = text.split(/\r?\n/).filter(l => l.trim() !== '');
    if (lines.length === 0) return { arrays: [], headersOrig: [], headersNorm: [], objects: [] };
    const parsed = lines.map(line => line.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/)
      .map(c => c.replace(/^"|"$/g,'').trim()));
    const headersOrig = parsed.shift().map(h => h || '');
    const headersNorm = headersOrig.map(h => normalizeHeader(h));
    const objects = parsed.map(cells => {
      const obj = {};
      headersNorm.forEach((key, idx) => { 
        obj[key] = cells[idx] !== undefined ? cells[idx] : ''; 
      });
      return obj;
    });
    return { arrays: parsed, headersOrig, headersNorm, objects };
  }

  // *** Novo: usa Sheets API v4 via auth_config.js ***
  async function fetchSheetByGid(gid) {
    return await fetchSheetByGidV4(SHEET_ID, gid);
  }

  function parseNumber(val) {
    if (val===undefined || val===null) return NaN;
    const s = String(val).replace(/\s/g,'').replace(/\./g,'').replace(/,/g,'.');
    return parseFloat(s.replace(/[^\d\.\-]/g,''));
  }
  function formatNumber(value) {
    if (isNaN(value)) return '0';
    return new Intl.NumberFormat('pt-BR').format(Math.round(value));
  }
  function escapeHtml(s) {
    if (s===undefined || s===null) return '';
    return String(s).replace(/[&<>"'\/]/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#x2F;'
    }[c]));
  }
  function getProdutoCorClasse(produto) {
    const p = (produto || '').toLowerCase();
    if (p.includes('soja')) return 'var(--produto-soja)';
    if (p.includes('milho')) return 'var(--produto-milho)';
    if (p.includes('sorgo')) return 'var(--produto-sorgo)';
    return 'var(--produto-sorgo)';
  }
  function extractContractNumber(raw) {
    if (!raw) return '';
    const s = String(raw).trim();
    if (s.includes('-')) return s.split('-')[0].trim();
    return s;
  }
  function extractCidadeFromDestino(texto) {
    if (!texto) return '';
    const s = String(texto);
    if (s.includes('-')) {
      const parts = s.split('-');
      return parts[parts.length - 1].trim();
    }
    return s.trim();
  }

  function processData(rowsArr) {
    // índices baseados na estrutura da planilha de entrega
    const contratoIndex = 1;
    const clienteIndex = 2;
    const produtoIndex = 3;
    const destinoIndex = 4;
    const safraIndex = 5;
    const volumeIndex = 6;
    const faltaIndex = 8;

    const clientesMap = {};
    const contratosSet = new Set();
    let totalSoja = 0, totalMilho = 0, totalSorgo = 0, totalGeral = 0;

    rowsArr.forEach(arr => {
      const contratoRaw = arr[contratoIndex] || '';
      const contrato = extractContractNumber(contratoRaw);
      const cliente = (arr[clienteIndex] || 'Cliente Desconhecido').toString().trim();
      const produto = (arr[produtoIndex] || 'Produto Desconhecido').toString().trim();
      const destino = arr[destinoIndex] || '';
      const cidade = extractCidadeFromDestino(destino);
      const safra = arr[safraIndex] || '';
      const volume = parseNumber(arr[volumeIndex] || '0');
      const falta = parseNumber(arr[faltaIndex] || '0');

      if (!contrato || isNaN(falta) || falta <= 0) return;

      const keyCliente = cliente;
      if (!clientesMap[keyCliente]) {
        clientesMap[keyCliente] = {
          cliente,
          contratos: [],
          totalFalta: 0,
          totalVolume: 0,
          cidades: new Set(),
          produtos: new Set()
        };
      }
      const cli = clientesMap[keyCliente];
      cli.contratos.push({
        contrato,
        produto,
        cidade,
        safra,
        volume,
        falta
      });
      cli.totalFalta += falta;
      cli.totalVolume += volume;
      cli.cidades.add(cidade || 'Cidade Desconhecida');
      cli.produtos.add(produto);

      contratosSet.add(contrato);

      const produtoLower = produto.toLowerCase();
      if (produtoLower.includes('soja')) totalSoja += falta;
      else if (produtoLower.includes('milho')) totalMilho += falta;
      else if (produtoLower.includes('sorgo')) totalSorgo += falta;
      totalGeral += falta;
    });

    document.getElementById('count-clientes').textContent = Object.keys(clientesMap).length;
    document.getElementById('count-contratos').textContent = contratosSet.size;
    document.getElementById('count-soja').textContent = formatNumber(totalSoja);
    document.getElementById('count-milho').textContent = formatNumber(totalMilho);
    document.getElementById('count-sorgo').textContent = formatNumber(totalSorgo);
    document.getElementById('count-total').textContent = formatNumber(totalGeral);

    return Object.values(clientesMap).sort((a,b)=>b.totalFalta-a.totalFalta);
  }

  function processDataByCity(rowsArr) {
    const contratoIndex = 1;
    const clienteIndex = 2;
    const produtoIndex = 3;
    const destinoIndex = 4;
    const safraIndex = 5;
    const volumeIndex = 6;
    const faltaIndex = 8;

    const cidadesMap = {};
    const contratosSet = new Set();
    let totalSoja = 0, totalMilho = 0, totalSorgo = 0, totalGeral = 0;

    rowsArr.forEach(arr => {
      const contratoRaw = arr[contratoIndex] || '';
      const contrato = extractContractNumber(contratoRaw);
      const cliente = (arr[clienteIndex] || 'Cliente Desconhecido').toString().trim();
      const produto = (arr[produtoIndex] || 'Produto Desconhecido').toString().trim();
      const destino = arr[destinoIndex] || '';
      const cidade = extractCidadeFromDestino(destino) || 'Cidade Desconhecida';
      const safra = arr[safraIndex] || '';
      const volume = parseNumber(arr[volumeIndex] || '0');
      const falta = parseNumber(arr[faltaIndex] || '0');

      if (!contrato || isNaN(falta) || falta <= 0) return;

      if (!cidadesMap[cidade]) {
        cidadesMap[cidade] = {
          cidade,
          contratos: [],
          totalFalta: 0,
          totalVolume: 0,
          clientes: new Set(),
          produtos: new Set(),
          safraSet: new Set()
        };
      }
      const city = cidadesMap[cidade];
      city.contratos.push({
        contrato,
        cliente,
        produto,
        cidade,
        safra,
        volume,
        falta
      });
      city.totalFalta += falta;
      city.totalVolume += volume;
      city.clientes.add(cliente);
      city.produtos.add(produto);
      if (safra) city.safraSet.add(safra);

      contratosSet.add(contrato);

      const produtoLower = produto.toLowerCase();
      if (produtoLower.includes('soja')) totalSoja += falta;
      else if (produtoLower.includes('milho')) totalMilho += falta;
      else if (produtoLower.includes('sorgo')) totalSorgo += falta;
      totalGeral += falta;
    });

    document.getElementById('count-clientes').textContent = Object.keys(cidadesMap).length;
    document.getElementById('count-contratos').textContent = contratosSet.size;
    document.getElementById('count-soja').textContent = formatNumber(totalSoja);
    document.getElementById('count-milho').textContent = formatNumber(totalMilho);
    document.getElementById('count-sorgo').textContent = formatNumber(totalSorgo);
    document.getElementById('count-total').textContent = formatNumber(totalGeral);

    return Object.values(cidadesMap).sort((a,b)=>b.totalFalta-a.totalFalta);
  }

  function renderClientCards(clients, filterText) {
    const container = document.getElementById('clientesContainer');
    container.innerHTML = '';
    const normFilter = normalizeText(filterText || '');
    if (!clients || clients.length === 0) {
      container.innerHTML = '<div class="empty">Nenhum registro encontrado.</div>';
      return;
    }
    const filtered = clients.filter(c => {
      if (!normFilter) return true;
      const fullText = normalizeText(
        c.cliente + ' ' +
        Array.from(c.cidades).join(' ') + ' ' +
        Array.from(c.produtos).join(' ')
      );
      return fullText.includes(normFilter);
    });
    if (filtered.length === 0) {
      container.innerHTML = '<div class="empty">Nenhum cliente encontrado com esse filtro.</div>';
      return;
    }
    filtered.forEach(cli => {
      const card = document.createElement('div');
      card.className = 'cliente-card';
      const produtosList = Array.from(cli.produtos).join(' / ') || 'N/A';
      const cidadesList = Array.from(cli.cidades).join(' / ') || 'N/A';

      let produtosTags = '';
      cli.produtos.forEach(p => {
        const corVar = getProdutoCorClasse(p);
        produtosTags += `<span class="cliente-produto" style="background-color:${corVar};">${escapeHtml(p)}</span> `;
      });

      card.innerHTML = `
        <div class="cliente-name">${escapeHtml(cli.cliente)}</div>
        <div class="cliente-info">
          <span class="info-label">Saldo total:</span>
          <span class="info-value">${formatNumber(cli.totalFalta)} KG</span>
        </div>
        <div class="cliente-info">
          <span class="info-label">Volume total:</span>
          <span class="info-value">${formatNumber(cli.totalVolume)} KG</span>
        </div>
        <div class="cliente-info">
          <span class="info-label">Cidades:</span>
          <span class="info-value">${escapeHtml(cidadesList)}</span>
        </div>
        <div class="cliente-info">
          <span class="info-label">Produtos:</span>
          <span class="info-value">${produtosTags || escapeHtml(produtosList)}</span>
        </div>
        <div class="cliente-info">
          <span class="info-label">Contratos:</span>
          <span class="info-value">${cli.contratos.length}</span>
        </div>
      `;
      card.addEventListener('click', () => openResumoModalCliente(cli));
      container.appendChild(card);
    });
  }

  function renderCityCards(cities, filterText) {
    const container = document.getElementById('clientesContainer');
    container.innerHTML = '';
    const normFilter = normalizeText(filterText || '');
    if (!cities || cities.length === 0) {
      container.innerHTML = '<div class="empty">Nenhum registro encontrado.</div>';
      return;
    }
    const filtered = cities.filter(c => {
      if (!normFilter) return true;
      const fullText = normalizeText(
        c.cidade + ' ' +
        Array.from(c.clientes).join(' ') + ' ' +
        Array.from(c.produtos).join(' ')
      );
      return fullText.includes(normFilter);
    });
    if (filtered.length === 0) {
      container.innerHTML = '<div class="empty">Nenhuma cidade encontrada com esse filtro.</div>';
      return;
    }
    filtered.forEach(city => {
      const card = document.createElement('div');
      card.className = 'cliente-card';
      const produtosList = Array.from(city.produtos).join(' / ') || 'N/A';
      const clientesList = Array.from(city.clientes).join(' / ') || 'N/A';
      const safraList = Array.from(city.safraSet).join(' / ');

      let produtosTags = '';
      city.produtos.forEach(p => {
        const corVar = getProdutoCorClasse(p);
        produtosTags += `<span class="cliente-produto" style="background-color:${corVar};">${escapeHtml(p)}</span> `;
      });

      card.innerHTML = `
        <div class="cliente-name">${escapeHtml(city.cidade)}</div>
        <div class="cliente-info">
          <span class="info-label">Saldo total:</span>
          <span class="info-value">${formatNumber(city.totalFalta)} KG</span>
        </div>
        <div class="cliente-info">
          <span class="info-label">Volume total:</span>
          <span class="info-value">${formatNumber(city.totalVolume)} KG</span>
        </div>
        <div class="cliente-info">
          <span class="info-label">Clientes:</span>
          <span class="info-value">${escapeHtml(clientesList)}</span>
        </div>
        <div class="cliente-info">
          <span class="info-label">Produtos:</span>
          <span class="info-value">${produtosTags || escapeHtml(produtosList)}</span>
        </div>
        ${safraList ? `
        <div class="cliente-info">
          <span class="info-label">Safra(s):</span>
          <span class="info-value">${escapeHtml(safraList)}</span>
        </div>` : ''}
        <div class="cliente-info">
          <span class="info-label">Contratos:</span>
          <span class="info-value">${city.contratos.length}</span>
        </div>
      `;
      card.addEventListener('click', () => openResumoModalCidade(city));
      container.appendChild(card);
    });
  }

  function openResumoModalCliente(group) {
    const body = document.getElementById('modalContentBody');
    let html = '';
    html += `<div class="modal-header"><h3>Cliente: ${escapeHtml(group.cliente)}</h3></div>`;
    html += `<div class="modal-body">`;
    html += `<p><span class="info-label">Saldo total (kg):</span> <span class="info-value">${formatNumber(group.totalFalta)} KG</span></p>`;
    html += `<p><span class="info-label">Volume total (kg):</span> <span class="info-value">${formatNumber(group.totalVolume)} KG</span></p>`;
    html += `<p><span class="info-label">Cidades:</span> <span class="info-value">${escapeHtml(Array.from(group.cidades).join(' / ') || 'N/A')}</span></p>`;
    html += `<p><span class="info-label">Produtos:</span> <span class="info-value">${escapeHtml(Array.from(group.produtos).join(' / ') || 'N/A')}</span></p>`;
    html += `<div class="modal-clientes-list">`;
    html += `<h4>Contratos (${group.contratos.length}):</h4>`;
    group.contratos.forEach(c => {
      const corVar = getProdutoCorClasse(c.produto);
      html += `
        <div class="contrato-item">
          <div class="contrato-linha">
            <strong>Contrato:</strong>
            <span>${escapeHtml(c.contrato)}</span>
          </div>
          <div class="contrato-linha">
            <strong>Cidade:</strong>
            <span>${escapeHtml(c.cidade)}</span>
          </div>
          <div class="contrato-linha">
            <strong>Produto:</strong>
            <span class="produto-tag" style="background-color:${corVar}; color:white; padding:2px 6px; border-radius:4px; font-weight:600;">${escapeHtml(c.produto)}</span>
          </div>
          <div class="contrato-linha">
            <strong>Volume:</strong>
            <span>${formatNumber(c.volume)} KG</span>
          </div>
          ${c.safra ? `<div class="contrato-linha"><strong>Safra:</strong> <span>${escapeHtml(c.safra)}</span></div>` : ''}
          <div class="contrato-linha">
            <strong>Saldo:</strong>
            <span>${formatNumber(c.falta)} KG</span>
          </div>
        </div>
      `;
    });
    html += `</div></div>`;
    body.innerHTML = html;
    document.getElementById('resumoModal').style.display = 'flex';
  }

  function openResumoModalCidade(group) {
    const body = document.getElementById('modalContentBody');
    let html = '';
    html += `<div class="modal-header"><h3>Cidade: ${escapeHtml(group.cidade)}</h3></div>`;
    html += `<div class="modal-body">`;
    html += `<p><span class="info-label">Saldo total (kg):</span> <span class="info-value">${formatNumber(group.totalFalta)} KG</span></p>`;
    html += `<p><span class="info-label">Volume total (kg):</span> <span class="info-value">${formatNumber(group.totalVolume)} KG</span></p>`;
    html += `<p><span class="info-label">Clientes:</span> <span class="info-value">${escapeHtml(Array.from(group.clientes).join(' / ') || 'N/A')}</span></p>`;
    html += `<p><span class="info-label">Produtos:</span> <span class="info-value">${escapeHtml(Array.from(group.produtos).join(' / ') || 'N/A')}</span></p>`;
    const safraList = Array.from(group.safraSet).join(' / ');
    if (safraList) {
      html += `<p><span class="info-label">Safra(s):</span> <span class="info-value">${escapeHtml(safraList)}</span></p>`;
    }
    html += `<div class="modal-clientes-list">`;
    html += `<h4>Contratos (${group.contratos.length}):</h4>`;
    group.contratos.forEach(c => {
      const corVar = getProdutoCorClasse(c.produto);
      html += `
        <div class="contrato-item">
          <div class="contrato-linha">
            <strong>Contrato:</strong>
            <span>${escapeHtml(c.contrato)}</span>
          </div>
          <div class="contrato-linha">
            <strong>Cliente:</strong>
            <span>${escapeHtml(c.cliente)}</span>
          </div>
          <div class="contrato-linha">
            <strong>Produto:</strong>
            <span class="produto-tag" style="background-color:${corVar}; color:white; padding:2px 6px; border-radius:4px; font-weight:600;">${escapeHtml(c.produto)}</span>
          </div>
          <div class="contrato-linha">
            <strong>Cidade:</strong>
            <span>${escapeHtml(c.cidade)}</span>
          </div>
          <div class="contrato-linha">
            <strong>Volume:</strong>
            <span>${formatNumber(c.volume)} KG</span>
          </div>
          ${c.safra ? `<div class="contrato-linha"><strong>Safra:</strong> <span>${escapeHtml(c.safra)}</span></div>` : ''}
          <div class="contrato-linha">
            <strong>Saldo:</strong>
            <span>${formatNumber(c.falta)} KG</span>
          </div>
        </div>
      `;
    });
    html += `</div></div>`;
    body.innerHTML = html;
    document.getElementById('resumoModal').style.display = 'flex';
  }

  function closeModal() {
    document.getElementById('resumoModal').style.display = 'none';
  }

  function updateToggleButton() {
    const btn = document.getElementById('toggleViewBtn');
    if (!btn) return;
    if (currentView === 'cliente') {
      btn.innerHTML = '<i class="fas fa-sync-alt"></i> Mudar para Locais';
    } else {
      btn.innerHTML = '<i class="fas fa-sync-alt"></i> Mudar para Clientes';
    }
  }

  function toggleView() {
    currentView = (currentView === 'cliente') ? 'local' : 'cliente';
    localStorage.setItem('lotes_entregas_view', currentView);
    updateToggleButton();
    renderCurrentView();
  }

  function renderCurrentView() {
    const filter = document.getElementById('filterInput').value || '';
    if (currentView === 'cliente') {
      const clients = processData(globalData);
      renderClientCards(clients, filter);
    } else {
      const cities = processDataByCity(globalData);
      renderCityCards(cities, filter);
    }
  }

  async function loadDataAndRender(isAutoUpdate = false) {
    try {
      // se não tiver token ainda, não tenta buscar
      if (!accessToken) {
        console.log('Waiting for authentication.');
        document.getElementById('lastUpdateTop').querySelector('span').innerText = 'Aguardando Login.';
        return;
      }

      if (isAutoUpdate) {
        document.getElementById('lastUpdateTop').querySelector('span').innerText = 'Atualizando.';
      } else {
        document.getElementById('lastUpdateTop').querySelector('span').innerText = 'Atualizando.';
      }

      const parsed = await fetchSheetByGid(GID_ENTREGA);
      globalData = parsed.arrays || [];
      renderCurrentView();
      document.getElementById('lastUpdateTop').querySelector('span').innerText =
        `Última atualização: ${new Date().toLocaleString('pt-BR')}`;
    } catch (err) {
      console.error(err);
      document.getElementById('clientesContainer').innerHTML =
        `<div class="empty">Erro ao carregar dados: ${escapeHtml(err.message)}</div>`;
      document.getElementById('lastUpdateTop').querySelector('span').innerText = 'Erro na atualização';
    }
  }

  document.getElementById('filterInput').addEventListener('input', () => {
    renderCurrentView();
  });
  document.getElementById('resumoModal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('resumoModal')) closeModal();
  });

  updateToggleButton();

  // Quando o login estiver ok, carrega a planilha de entrega
  onAuthSuccess = () => {
    loadDataAndRender();
  };

  // Atualização automática respeitando o login
  setInterval(() => {
    loadDataAndRender(true);
  }, AUTO_UPDATE_INTERVAL);
  </script>
</body>
</html>
