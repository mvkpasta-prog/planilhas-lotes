<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Controle de Lotes</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    :root {
      --primary: #2563eb;
      --accent: #0ea5e9;
      --bg: #f6fbff;
      --card: #fff;
      --text: #0f172a;
      --muted: #6b7280;
      --success: #10b981;
      --warning: #f59e0b;
      --status-carregado: #10b981;
      --status-embarque: #3b82f6;
      --status-transito: #ef4444;
      --status-contratar: #f97316;
      --produto-soja: #10b981;
      --produto-milho: #fbbf24;
      --produto-sorgo: #6b7280;
      --produto-total: #8b5cf6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      padding: 12px;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('https://raw.githubusercontent.com/mvkpasta-prog/planilhas-lotes/main/mvklogo.png');
      background-repeat: no-repeat;
      background-position: center center;
      background-size: 80vh;
      opacity: 0.05;
      z-index: -1;
      pointer-events: none;
    }

    body.updating {
      cursor: progress;
    }

    header {
      background: linear-gradient(90deg, var(--primary), var(--accent));
      color: white;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      text-align: center;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .last-update-top {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.9);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .wrap {
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }

    .header-btn {
      background: #fff;
      color: var(--primary);
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
      text-decoration: none;
      transition: background 0.2s ease, opacity 0.2s ease;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .header-btn:hover {
      background: var(--bg);
      opacity: 0.95;
    }

    .status-cards,
    .produto-cards {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 16px;
    }

    .status-card,
    .produto-card {
      background: var(--card);
      border-radius: 8px;
      padding: 12px;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.06);
      min-width: 160px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .status-card:hover,
    .produto-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 12px rgba(0, 0, 0, 0.08);
    }

    .status-card h3,
    .produto-card h3 {
      margin: 0 0 6px 0;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .status-card .count,
    .produto-card .count {
      font-size: 22px;
      font-weight: 800;
    }

    .status-card-carregado {
      border-left: 4px solid var(--status-carregado);
    }

    .status-card-embarque {
      border-left: 4px solid var(--status-embarque);
    }

    .status-card-transito {
      border-left: 4px solid var(--status-transito);
    }

    .status-card-contratar {
      border-left: 4px solid var(--status-contratar);
    }

    .produto-soja {
      border-left: 4px solid var(--produto-soja);
    }

    .produto-milho {
      border-left: 4px solid var(--produto-milho);
    }

    .produto-sorgo {
      border-left: 4px solid var(--produto-sorgo);
    }

    .produto-total {
      border-left: 4px solid var(--produto-total);
      cursor: pointer;
    }

    .produto-total:hover {
      box-shadow: 0 5px 12px rgba(0, 0, 0, 0.12);
    }

    .clientes-section {
      margin-top: 12px;
      margin-bottom: 16px;
    }

    .clientes-section h2 {
      color: var(--primary);
      margin: 6px 0 12px 0;
      font-size: 18px;
    }

    .clientes-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }

    .cliente-card {
      background: var(--card);
      border-radius: 8px;
      padding: 12px;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.06);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
    }

    .cliente-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 12px rgba(0, 0, 0, 0.1);
    }

    .cliente-name {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 4px;
    }

    .cliente-info {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-top: 2px;
    }

    .info-label {
      color: var(--muted);
      font-weight: 600;
    }

    .info-value {
      font-weight: 600;
    }

    .status-tag {
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      color: #fff;
    }

    .status-pendente-tag {
      background: var(--status-embarque);
    }

    .status-carregado-tag {
      background: var(--status-carregado);
    }

    .produto-badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      color: #fff;
      margin-right: 4px;
      margin-top: 4px;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 12px;
      font-style: italic;
    }

    .section-header {
      margin-top: 16px;
      background: var(--card);
      border-radius: 8px;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.06);
    }

    .section-header span {
      font-weight: 700;
      color: var(--text);
    }

    .section-content {
      margin-top: 6px;
      background: var(--card);
      border-radius: 8px;
      padding: 10px;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.06);
      display: none;
    }

    .section-content.open {
      display: block;
    }

    .toggle-icon {
      transition: transform 0.2s ease;
    }

    .section-header.open .toggle-icon {
      transform: rotate(180deg);
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 800px;
    }

    th,
    td {
      border-bottom: 1px solid #e5e7eb;
      padding: 6px 8px;
      font-size: 12px;
      text-align: left;
      white-space: nowrap;
    }

    th {
      background: #eff6ff;
      font-weight: 700;
      color: #1f2937;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tr:hover td {
      background: #f9fafb;
    }

    .filter-input {
      flex-grow: 1;
      min-width: 220px;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #d1d5db;
      font-size: 13px;
    }

    .filter-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    @media (max-width: 900px) {
      table {
        min-width: 650px;
      }

      th,
      td {
        padding: 6px;
        font-size: 11px;
      }

      .status-cards,
      .produto-cards {
        flex-direction: column;
      }

      .clientes-container {
        grid-template-columns: 1fr;
      }

      .cliente-card {
        min-width: 260px;
      }
    }

    @media (max-width: 600px) {
      body {
        padding: 8px;
      }

      .section-header {
        padding: 10px;
        font-size: 14px;
      }

      .cliente-card {
        min-width: 100%;
        padding: 12px;
      }

      .status-card {
        min-width: 140px;
        padding: 10px;
      }

      .produto-card {
        min-width: 130px;
        padding: 8px;
      }

      header {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }

      .header-title {
        width: 100%;
        justify-content: space-between;
      }

      .last-update-top {
        order: 3;
      }

      .header-btn {
        order: 2;
        width: 100%;
        text-align: center;
        justify-content: center;
      }
    }
  </style>

</head>

  <script>
    const SHEET_ID = '1o0wF2ScSkyxqY8FHFI-rA6k_3uMI2wsZr2wQG8JD4B4';
    const GIDS = {
      entrega: '1186247985',
      retirada: '1984691910',
      programacao: '1183141602'
    };
    const AUTO_UPDATE_INTERVAL = 300000;

    let globalProdutosTotais = { soja: 0, milho: 0, sorgo: 0, total: 0 };

    // valores anteriores dos cards (para animação)
    const cardValues = {
      carregado: 0,
      embarque: 0,
      transito: 0,
      contratar: 0,
      soja: 0,
      milho: 0,
      sorgo: 0,
      total: 0
    };

    // animação de contadores (tipo placar)
    function animateCount(id, from, to, { suffix = '', formatted = false, duration = 800 } = {}) {
      const el = document.getElementById(id);
      if (!el) return;

      from = Number(from) || 0;
      to = Number(to) || 0;
      const diff = to - from;

      const applyValue = (val) => {
        const display = formatted ? formatNumber(val) : val;
        el.textContent = suffix ? `${display} ${suffix}` : String(display);
      };

      if (diff === 0) {
        applyValue(to);
        return;
      }

      const startTime = performance.now();

      function tick(now) {
        const progress = Math.min((now - startTime) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3); // easeOutCubic
        const current = Math.round(from + diff * eased);
        applyValue(current);
        if (progress < 1) {
          requestAnimationFrame(tick);
        }
      }

      requestAnimationFrame(tick);
    }

    function normalizeHeader(h) {
      if (h === undefined || h === null) return '';
      return String(h)
        .trim()
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9]/g, '');
    }

    function normalizeText(text) {
      if (text === undefined || text === null) return '';
      return String(text)
        .trim()
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '');
    }

    function parseCSV(text) {
      if (!text) return { arrays: [], headersOrig: [], headersNorm: [], objects: [] };
      const lines = text.split(/\r?\n/).filter(l => l.trim() !== '');
      if (lines.length === 0) return { arrays: [], headersOrig: [], headersNorm: [], objects: [] };
      const parsed = lines.map(line =>
        line
          .split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/)
          .map(c => c.replace(/^"|"$/g, '').trim())
      );
      const headersOrig = parsed.shift().map(h => h || '');
      const headersNorm = headersOrig.map(h => normalizeHeader(h));
      const objects = parsed.map(cells => {
        const obj = {};
        headersNorm.forEach((key, idx) => {
          obj[key] = cells[idx] !== undefined ? cells[idx] : '';
        });
        return obj;
      });
      return { arrays: parsed, headersOrig, headersNorm, objects };
    }

    // usa Sheets API v4 via auth_config.js
    async function fetchSheetByGid(gid) {
      return await fetchSheetByGidV4(SHEET_ID, gid);
    }

    function parseNumber(val) {
      if (val === undefined || val === null) return NaN;
      const s = String(val).replace(/\s/g, '').replace(/\./g, '').replace(/,/g, '.');
      const n = parseFloat(s.replace(/[^\d.\-]/g, ''));
      return isNaN(n) ? NaN : n;
    }

    function formatNumber(value) {
      if (isNaN(value)) return '0';
      return new Intl.NumberFormat('pt-BR').format(Math.round(value));
    }

    function escapeHtml(s) {
      if (s === undefined || s === null) return '';
      return String(s).replace(/[&<>"'\/]/g, c => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#x2F;'
      }[c]));
    }

    function parseDateOnly(v) {
      if (!v) return null;
      if (v instanceof Date) {
        return new Date(v.getFullYear(), v.getMonth(), v.getDate());
      }
      const s = String(v).trim();
      if (!s) return null;
      // formatos comuns: dd/mm/aaaa, aaaa-mm-dd
      if (/^\d{2}\/\d{2}\/\d{4}$/.test(s)) {
        const [d, m, y] = s.split('/').map(Number);
        return new Date(y, m - 1, d);
      }
      if (/^\d{4}-\d{2}-\d{2}$/.test(s)) {
        const [y, m, d] = s.split('-').map(Number);
        return new Date(y, m - 1, d);
      }
      const n = Number(s);
      if (!isNaN(n)) {
        // data em número (Google Sheets)
        const base = new Date(1899, 11, 30);
        const ms = base.getTime() + n * 86400000;
        return new Date(new Date(ms).getFullYear(), new Date(ms).getMonth(), new Date(ms).getDate());
      }
      const dt = new Date(s);
      if (!isNaN(dt.getTime())) {
        return new Date(dt.getFullYear(), dt.getMonth(), dt.getDate());
      }
      return null;
    }

    function getSaudacao() {
      const hora = new Date().getHours();
      if (hora >= 5 && hora < 12) return 'Bom dia';
      if (hora >= 12 && hora < 18) return 'Boa tarde';
      return 'Boa noite';
    }

    function formatResumoMessage(soja, milho, sorgo, total) {
      const saudacao = getSaudacao();
      const sojaKg = formatNumber(soja);
      const milhoKg = formatNumber(milho);
      const sorgoKg = formatNumber(sorgo);
      const totalKg = formatNumber(total);
      const icones = [];
      if (soja > 0) icones.push('🌱');
      if (milho > 0) icones.push('🌽');
      if (sorgo > 0) icones.push('🌾');
      const iconesLine = icones.join(' ');
      const sojaLine = `Soja: ${sojaKg} kg`;
      const milhoLine = `Milho: ${milhoKg} kg`;
      const sorgoLine = sorgo > 0 ? `Sorgo: ${sorgoKg} kg` : '';
      let message = `${saudacao}
Embarque encerrado ${iconesLine}
`;
      message += `${sojaLine}
`;
      message += `${milhoLine}
`;
      if (sorgoLine) {
        message += `${sorgoLine}
`;
      }
      message += `Total embarcado: ${totalKg} kg
Bom descanso a todos 🙌🏻🙏🏻`;
      return message.trim();
    }

    function handleTotalCardClick() {
      const { soja, milho, sorgo, total } = globalProdutosTotais;
      const message = formatResumoMessage(soja, milho, sorgo, total);
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(message).then(() => {
          alert(`Mensagem copiada para a área de transferência:
${message}`);
        }).catch(err => {
          console.error('Falha ao copiar:', err);
          alert(`Falha ao copiar. Copie a mensagem manualmente:
${message}`);
        });
      } else {
        alert(`Copie a mensagem manualmente:
${message}`);
      }
    }

    function buildClientesResumo(rows, headersNorm) {
      const idxCliente = headersNorm.findIndex(h => h.includes('cliente'));
      const idxProduto = headersNorm.findIndex(h => h.includes('produto'));
      const idxDestino = headersNorm.findIndex(h =>
        h.includes('destino') || h.includes('local') || h.includes('cidade')
      );
      const idxStatus = headersNorm.findIndex(h => h.includes('status') && !h.includes('agendamento'));
      const idxPlaca = headersNorm.findIndex(h => h.includes('placa'));
      const idxPeso = headersNorm.findIndex(h =>
        h.includes('kg') || h.includes('peso') || h.includes('quantidade') || h.includes('qtd')
      );

      const map = new Map();

      rows.forEach(arr => {
        const cliente = (arr[idxCliente] || 'Cliente não informado').toString().trim();
        const produto = (arr[idxProduto] || '').toString().trim();
        const destino = (arr[idxDestino] || '').toString().trim();
        const statusRaw = (arr[idxStatus] || '').toString();
        const statusNorm = normalizeText(statusRaw);
        const placa = (idxPlaca >= 0 ? (arr[idxPlaca] || '') : '').toString().trim();
        const peso = parseNumber(arr[idxPeso]);

        if (!map.has(cliente)) {
          map.set(cliente, {
            cliente,
            produtos: new Set(),
            destinos: new Set(),
            placas: new Set(),
            placasCarregadas: new Set(),
            totalKg: 0,
            totalViagens: 0,
            emEmbarqueKg: 0,
            emTransitoKg: 0
          });
        }
        const obj = map.get(cliente);

        if (produto) obj.produtos.add(produto);
        if (destino) obj.destinos.add(destino);
        if (placa) obj.placas.add(placa);
        if (!isNaN(peso) && peso > 0) {
          obj.totalKg += peso;
        }
        obj.totalViagens++;

        if (statusNorm.includes('embarque')) {
          if (!isNaN(peso)) obj.emEmbarqueKg += peso;
        }
        if (statusNorm.includes('transit')) {
          if (!isNaN(peso)) obj.emTransitoKg += peso;
        }
        if (statusNorm.includes('carregado') && placa) {
          obj.placasCarregadas.add(placa);
        }
      });

      return Array.from(map.values()).sort((a, b) => b.totalKg - a.totalKg);
    }

    function renderClientes(cards, filterText) {
      const container = document.getElementById('clientesContainer');
      container.innerHTML = '';
      if (!cards || cards.length === 0) {
        container.innerHTML = '<div class="empty">Nenhum embarque encontrado para hoje.</div>';
        return;
      }
      const normFilter = normalizeText(filterText || '');
      const filtered = cards.filter(c => {
        if (!normFilter) return true;
        const texto = [
          c.cliente,
          Array.from(c.destinos).join(' '),
          Array.from(c.produtos).join(' '),
          Array.from(c.placas).join(' ')
        ].join(' ');
        return normalizeText(texto).includes(normFilter);
      });

      if (filtered.length === 0) {
        container.innerHTML = '<div class="empty">Nenhum cliente encontrado com esse filtro.</div>';
        return;
      }

      filtered.forEach(c => {
        const card = document.createElement('div');
        card.className = 'cliente-card';

        let produtosTags = '';
        c.produtos.forEach(p => {
          const prodNorm = normalizeText(p);
          let cor = 'var(--produto-sorgo)';
          if (prodNorm.includes('soja')) cor = 'var(--produto-soja)';
          else if (prodNorm.includes('milho')) cor = 'var(--produto-milho)';
          produtosTags += `<span class="produto-badge" style="background:${cor};">${escapeHtml(p)}</span>`;
        });

        const destinos = Array.from(c.destinos).join(' / ') || '—';

        card.innerHTML = `
          <div class="cliente-name">${escapeHtml(c.cliente)}</div>
          <div>${produtosTags}</div>
          <div class="cliente-info">
            <span class="info-label">Total embarcado:</span>
            <span class="info-value">${formatNumber(c.totalKg)} KG</span>
          </div>
          <div class="cliente-info">
            <span class="info-label">Caminhões:</span>
            <span class="info-value">${c.placas.size}</span>
          </div>
          <div class="cliente-info">
            <span class="info-label">Embarque / Trânsito:</span>
            <span class="info-value">${formatNumber(c.emEmbarqueKg)} / ${formatNumber(c.emTransitoKg)} KG</span>
          </div>
          <div class="cliente-info">
            <span class="info-label">Destinos:</span>
            <span class="info-value">${escapeHtml(destinos)}</span>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function buildProgramacaoTable(rows, headersOrig, headersNorm) {
      if (!rows || rows.length === 0) {
        return '<div class="empty">Nenhuma linha na programação de hoje.</div>';
      }
      // remove algumas colunas mais poluídas
      const removed = ['observacoes', 'ordem', 'chaveid', 'mdfe', 'dacte', 'statusagendamento']
        .map(normalizeHeader);
      const visibleIdx = [];
      const visibleHeaders = [];
      headersNorm.forEach((h, idx) => {
        if (!h) return;
        if (removed.includes(h)) return;
        visibleIdx.push(idx);
        visibleHeaders.push(headersOrig[idx] || '');
      });

      let html = '<table><thead><tr>';
      visibleHeaders.forEach(h => {
        html += `<th>${escapeHtml(h)}</th>`;
      });
      html += '</tr></thead><tbody>';

      rows.forEach(arr => {
        html += '<tr>';
        visibleIdx.forEach(idx => {
          const val = arr[idx] !== undefined ? arr[idx] : '';
          html += `<td>${escapeHtml(val)}</td>`;
        });
        html += '</tr>';
      });

      html += '</tbody></table>';
      return html;
    }

    async function loadAll(isAutoUpdate = false) {
      try {
        if (isAutoUpdate) {
          document.getElementById('lastUpdateTop').innerHTML = `
            <i class="fas fa-hourglass-half" style="color: rgba(255,255,255,0.9);"></i>
            <span>Atualizando...</span>`;
          document.body.classList.add('updating');
        }

        if (!accessToken) {
          console.log('Waiting for authentication.');
          document.getElementById('lastUpdateTop').innerHTML = '<span>Aguardando Login.</span>';
          document.body.classList.remove('updating');
          return;
        }

        const prog = await fetchSheetByGid(GIDS.programacao);
        const rowsArrProg = prog.arrays || [];
        const headersOrigProg = prog.headersOrig || [];
        const headersNormProg = prog.headersNorm || [];

        if (!rowsArrProg.length || !headersNormProg.length) {
          document.getElementById('clientesContainer').innerHTML =
            '<div class="empty">Nenhum dado encontrado na aba Programação.</div>';
          document.body.classList.remove('updating');
          return;
        }

        const dateKeyProg =
          headersNormProg.find(h => h.includes('data') && !h.includes('atualizacao')) ||
          headersNormProg[0];
        const dateIndexProg = headersNormProg.indexOf(dateKeyProg);

        const today = new Date();
        const todayStart = new Date(today.getFullYear(), today.getMonth(), today.getDate()).getTime();

        const rowsArrProgFiltered = [];
        for (let i = 0; i < rowsArrProg.length; i++) {
          const arr = rowsArrProg[i];
          const dtVal = arr[dateIndexProg];
          const dt = parseDateOnly(dtVal);
          if (!dt) continue;
          if (dt.getTime() === todayStart) {
            rowsArrProgFiltered.push(arr);
          }
        }

        if (rowsArrProgFiltered.length === 0) {
          document.getElementById('clientesContainer').innerHTML =
            '<div class="empty">Nenhum embarque programado para hoje.</div>';
        }

        const statusKey =
          headersNormProg.find(h => h.includes('status') && !h.includes('agendamento')) || null;
        const statusIndex = statusKey ? headersNormProg.indexOf(statusKey) : -1;
        const placaIndex = headersNormProg.findIndex(h => h.includes('placa'));

        // contagem de status
        const placasCarregadas = new Set();
        let embarqueCount = 0;
        let transitoCount = 0;
        let contratarCount = 0;

        rowsArrProgFiltered.forEach(arr => {
          if (statusIndex < 0) return;
          const status = normalizeText(arr[statusIndex] || '');
          const placa = placaIndex >= 0 ? (arr[placaIndex] || '').toString().trim() : '';
          if (status.includes('carregado') && placa) {
            placasCarregadas.add(placa);
          }
          if (status.includes('embarque')) {
            embarqueCount++;
          }
          if (status.includes('transit')) {
            transitoCount++;
          }
          if (status.includes('contrat')) {
            contratarCount++;
          }
        });

        const carregadoUnico = placasCarregadas.size;

        // anima cards de status
        animateCount('count-carregado', cardValues.carregado, carregadoUnico);
        cardValues.carregado = carregadoUnico;

        animateCount('count-embarque', cardValues.embarque, embarqueCount);
        cardValues.embarque = embarqueCount;

        animateCount('count-transito', cardValues.transito, transitoCount);
        cardValues.transito = transitoCount;

        animateCount('count-contratar', cardValues.contratar, contratarCount);
        cardValues.contratar = contratarCount;

        // totais por produto
        const idxProduto = headersNormProg.findIndex(h => h.includes('produto'));
        const idxPeso = headersNormProg.findIndex(h =>
          h.includes('kg') || h.includes('peso') || h.includes('quantidade') || h.includes('qtd')
        );

        let soja = 0, milho = 0, sorgo = 0;
        rowsArrProgFiltered.forEach(arr => {
          const produto = normalizeText(arr[idxProduto] || '');
          const peso = parseNumber(arr[idxPeso]);
          if (isNaN(peso) || peso <= 0) return;
          if (produto.includes('soja')) soja += peso;
          else if (produto.includes('milho')) milho += peso;
          else if (produto.includes('sorgo')) sorgo += peso;
        });

        const totalEmbarcado = soja + milho + sorgo;
        globalProdutosTotais = {
          soja: Math.round(soja),
          milho: Math.round(milho),
          sorgo: Math.round(sorgo),
          total: Math.round(totalEmbarcado)
        };

        // anima cards de produto
        animateCount('count-soja', cardValues.soja, soja, { suffix: 'KG', formatted: true });
        cardValues.soja = soja;

        animateCount('count-milho', cardValues.milho, milho, { suffix: 'KG', formatted: true });
        cardValues.milho = milho;

        animateCount('count-sorgo', cardValues.sorgo, sorgo, { suffix: 'KG', formatted: true });
        cardValues.sorgo = sorgo;

        animateCount('count-total', cardValues.total, totalEmbarcado, { suffix: 'KG', formatted: true });
        cardValues.total = totalEmbarcado;

        // cards de clientes
        const clientesResumo = buildClientesResumo(rowsArrProgFiltered, headersNormProg);
        const filterText = document.getElementById('filterInput').value || '';
        renderClientes(clientesResumo, filterText);

        // tabela Programação
        document.getElementById('programacaoContent').innerHTML =
          buildProgramacaoTable(rowsArrProgFiltered, headersOrigProg, headersNormProg);

        // update header
        document.getElementById('lastUpdateTop').innerHTML = `
          <i class="fas fa-check-circle" style="color: rgba(255,255,255,0.9);"></i>
          <span>Atualizado em ${new Date().toLocaleString('pt-BR')}</span>`;
        document.body.classList.remove('updating');
      } catch (err) {
        console.error('Erro loadAll (Página Inicial):', err);
        document.getElementById('clientesContainer').innerHTML =
          '<div class="empty">Erro ao carregar dados. Verifique a conexão ou as configurações da planilha (ver console).</div>';
        document.getElementById('lastUpdateTop').innerHTML = `
          <i class="fas fa-exclamation-triangle" style="color: rgba(255,255,255,0.9);"></i>
          <span>Erro na atualização</span>`;
        document.body.classList.remove('updating');
      }
    }

    // callback quando o login estiver pronto
    onAuthSuccess = () => {
      loadAll(true);
    };

    let autoUpdateInterval;
    function startAutoUpdate() {
      autoUpdateInterval = setInterval(() => {
        loadAll(true);
      }, AUTO_UPDATE_INTERVAL);
    }

    document.addEventListener('DOMContentLoaded', function () {
      document.getElementById('filterInput').addEventListener('input', () => {
        // refaz apenas os cards de clientes com filtro atual
        // (reaproveitamos os dados recalculando rapidamente de novo)
        // Para simplificar, chamamos loadAll(true) se estiver autenticado
        if (accessToken) {
          loadAll(true);
        }
      });

      document.getElementById('card-total-embarcado').addEventListener('click', handleTotalCardClick);

      const toggle = document.getElementById('toggle-programacao');
      const content = document.getElementById('content-programacao');
      toggle.addEventListener('click', () => {
        const isOpen = content.classList.toggle('open');
        if (isOpen) {
          toggle.classList.add('open');
        } else {
          toggle.classList.remove('open');
        }
      });

      startAutoUpdate();

      document.addEventListener('visibilitychange', function () {
        if (!document.hidden) {
          if (accessToken) {
            loadAll(true);
          }
        }
      });
    });
  </script>
